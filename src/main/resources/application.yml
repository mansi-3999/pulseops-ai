spring:
  application:
    name: pulseops-ai

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: pulseops-telemetry-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.mansi.pulseops.telemetry.dto
        spring.json.value.default.type: com.mansi.pulseops.telemetry.dto.TelemetryEventMessage

server:
  port: ${SERVER_PORT:8080}

resilience4j:
  circuitbreaker:
    instances:
      bedrockAi:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true

  retry:
    instances:
      bedrockAi:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

    metrics:
      tags:
        application: pulseops-ai

springdoc:
  swagger-ui:
    path: /swagger-ui.html

pulseops:
  kafka:
    topics:
      telemetry-raw: pulseops.telemetry.raw
  ai:
    enabled: ${PULSEOPS_AI_ENABLED:true}
    region: ${AWS_REGION:us-east-1}
    model-id: ${BEDROCK_MODEL_ID:amazon.nova-lite-v1:0}
    max-tokens: 1200
    temperature: 0.2

  correlation:
    minimum-events: 2

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [correlationId=%X{correlationId:-N/A}] %logger{36} - %msg%n"