services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseops-postgres
    environment:
      POSTGRES_DB: pulseops
      POSTGRES_USER: pulseops
      POSTGRES_PASSWORD: pulseops
    ports:
      - "5432:5432"
    volumes:
      - pulseops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pulseops -d pulseops" ]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.1
    container_name: pulseops-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  pulseops-ai:
    build: .
    container_name: pulseops-ai

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: docker

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      PULSEOPS_AI_ENABLED: "true"

      AWS_REGION: ap-south-1

      BEDROCK_MODEL_ID: amazon.nova-lite-v1:0

volumes:
  pulseops_pgdata:
