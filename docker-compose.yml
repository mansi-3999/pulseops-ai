services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseops-postgres
    environment:
      POSTGRES_DB: pulseops
      POSTGRES_USER: pulseops
      POSTGRES_PASSWORD: pulseops
    ports: ["5432:5432"]
    volumes: [pulseops_pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseops -d pulseops"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pulseops_pgdata:
